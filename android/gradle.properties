org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
android.useAndroidX=true
# Jetifier disabled: no dependency still ships com.android.support classes, and
# jetifying creates a transformed copy of every jar (including the ~170 MB
# Flutter engine), roughly doubling the Gradle transform cache.
android.enableJetifier=false
kotlin.code.style=official
