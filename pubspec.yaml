name: teapodstream
description: "VPN client supporting xray protocol with TUN interface"
publish_to: 'none'
version: 1.4.7+10407

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Sharing
  share_plus: ^10.1.4

  # QR code scanning
  mobile_scanner: ^7.2.0

  # Networking
  http: ^1.2.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

  # Charts for speed graph
  fl_chart: ^1.2.0

  # Typography
  google_fonts: ^6.2.1

  # Permissions
  permission_handler: ^12.0.1
  package_info_plus: ^9.0.1
  url_launcher_android: ^6.3.29
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  socks5_proxy: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/binaries/
    - assets/brave_opossum.png
